    notes: Strongest water-irrigation candidate so far on Colab. Full Colab 294-case label/review scores are above target, but pasted examples show invalid invented labels in some sensor-anomaly cases. Rerun Colab eval with allowed_labels_rate before publishing; publish only if invalid_output_count is zero or post-processing enforces the schema.
