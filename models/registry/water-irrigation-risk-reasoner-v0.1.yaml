id: pomona-water-irrigation-risk-reasoner-v0.1
name: Pomona Water Irrigation Risk Reasoner
version: 0.1.0
author: Okyanus
license: apache-2.0

type: water_irrigation_risk_reasoner
status: published_release_candidate

github:
  platform_repo: Okyanus/pomona
  docs: docs/WATER_IRRIGATION_RISK_REASONER.md

huggingface:
  repo_id: Okyanus/pomona-water-irrigation-risk-reasoner-v0.1.8-lora
  base_model: Qwen/Qwen2.5-0.5B-Instruct
  url: https://huggingface.co/Okyanus/pomona-water-irrigation-risk-reasoner-v0.1.8-lora
  dataset: null
  published: true
  release_status: release_candidate
  published_on: "2026-07-11"

runtime:
  engine: peft-lora
  format: safetensors
  output_format: json_object
  backends:
    - huggingface_local
    - rules_fallback
    - stub

inputs:
  required:
    - farm_context
    - sensor
    - expected_fields

outputs:
  schema:
    - irrigation_risk_labels
    - missing_fields
    - suspect_fields
    - safe_next_checks
    - blocked_actions
    - human_review_required
    - rationale

safety:
  advisory_only: true
  final_authority: false
  requires_deterministic_checker: true
  forbidden:
    - autonomous_irrigation_change
    - direct_pump_control
    - direct_valve_control
    - irrigation_schedule_change

integration:
  pomona_flow: |
    sensor quality reasoner -> water irrigation risk reasoner -> safety triage reasoner -> deterministic actuator gate
  service:
    - model-router
    - safety-checker

evaluation:
  v0_1_local:
    status: failed_experiment
    cases: 50
    valid_json_rate: 1.0
    allowed_labels_rate: 1.0
    exact_match_rate: 0.0
    label_f1_avg: 0.0667
    blocked_f1_avg: 0.692
    human_review_match_rate: 0.9
    notes: Learned JSON shape but over-predicted insufficient_context; do not publish.
  v0_1_1_realderived:
    status: trained_local_not_publishable
    dataset_zip: private/colab/pomona-water-irrigation-risk-v0.1.1-realderived-training-data.zip
    scope: moisture risk only; pump and valve conflicts stay deterministic.
    local_eval_50:
      valid_json_rate: 1.0
      allowed_labels_rate: 1.0
      allowed_blocked_actions_rate: 1.0
      exact_match_rate: 0.16
      label_f1_avg: 0.6
      missing_f1_avg: 1.0
      suspect_f1_avg: 0.6
      blocked_f1_avg: 0.6
      human_review_match_rate: 0.6
    colab_eval_50:
      valid_json_rate: 1.0
      exact_match_rate: 0.58
      label_f1_avg: 0.58
      blocked_f1_avg: 0.58
      human_review_match_rate: 0.58
    notes: Better than v0.1 but still not public-usable; misses stale/anomaly/boundary risk states.
  v0_1_2_hardcases:
    status: rejected_regression
    dataset_zip: private/colab/pomona-water-irrigation-risk-v0.1.2-hardcases-training-data.zip
    records: 3000
    train: 2400
    validation: 300
    test: 300
    scope: moisture risk only with stale/anomaly/boundary hardcases.
    target: improve stale_irrigation_data, sensor_anomaly, low/high moisture boundary handling, and normal near-miss separation.
    local_eval_50:
      valid_json_rate: 1.0
      allowed_labels_rate: 1.0
      exact_match_rate: 0.02
      label_f1_avg: 0.44
      blocked_f1_avg: 0.44
      human_review_match_rate: 0.44
    notes: Regressed by over-predicting normal; do not use.
  v0_1_3_balancedfix:
    status: trained_local_candidate_not_published
    dataset_zip: private/colab/pomona-water-irrigation-risk-v0.1.3-balancedfix-training-data.zip
    adapter_zip: private/colab/adapters/water-irrigation-risk-v0.1.3-balancedfix-local.zip
    records: 2520
    train: 2016
    validation: 252
    test: 252
    target: balanced buckets to reduce normal-collapse regression.
    local_eval_50:
      valid_json_rate: 1.0
      allowed_labels_rate: 1.0
      allowed_blocked_actions_rate: 1.0
      exact_match_rate: 0.02
      label_f1_avg: 0.64
      missing_f1_avg: 0.92
      suspect_f1_avg: 0.8
      blocked_f1_avg: 0.9
      human_review_match_rate: 0.9
    colab_eval_50:
      valid_json_rate: 1.0
      exact_match_rate: 0.66
      label_f1_avg: 0.82
      blocked_f1_avg: 0.82
      human_review_match_rate: 0.82
    notes: Best water-irrigation candidate so far. Good JSON/schema safety and much better review gating, but local label F1 is still below publish threshold and exact match remains weak. Keep local; do not publish yet.
  v0_1_4_edgefix:
